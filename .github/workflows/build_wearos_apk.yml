name: 🦈 Build ProximityShark WearOS APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-wearos:
    name: ⌚ Wear OS APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Wear OS release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx4096m -XX:MaxMetaspaceSize=1024m'"

      - name: Rename APK → Proximity-Shark-1.0.4 (wear os).apk
        run: |
          mkdir -p RELEASES/Proximity-Shark-1.0.4
          cp app/build/outputs/apk/release/app-release.apk \
             RELEASES/Proximity-Shark-1.0.4/"Proximity-Shark-1.0.4 (wear os).apk"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Proximity-Shark-1.0.4 (wear os)
          path: RELEASES/Proximity-Shark-1.0.4/*.apk
          retention-days: 30

      # ── Auto-create GitHub Release on version tags ──────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: RELEASES/Proximity-Shark-1.0.4/"Proximity-Shark-1.0.4 (wear os).apk"
          name: "🦈⌚ Proximity Shark WearOS ${{ github.ref_name }} — Shark Chat (P2P)"
          body: |
            ## ⌚ Proximity Shark WearOS ${{ github.ref_name }} — Shark Chat (P2P)

            ### 🚀 Novità in questa release (v1.0.4):
            - **💬 Shark Chat P2P**: Nuova chat offline sincronizzata con lo smartphone.
            - **⌨️ Input Tastiera**: Rispondi ai messaggi usando la tastiera o la voce dell'orologio.
            - **⚡ Messaggi Veloci**: Selezione rapida di risposte preimpostate.
            - **🚨 Panic & Tools**: Interfaccia migliorata con timer e animazioni pulse.

            ### APK incluso:
            - `Proximity-Shark-1.0.4 (wear os).apk` — Build per smartwatch.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
