name: 🦈 Build ProximityShark WearOS APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-wearos:
    name: ⌚ Wear OS APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Wear OS release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx4096m -XX:MaxMetaspaceSize=1024m'"

      - name: Rename APK → Proximity-Shark-1.0.2 (wear os) v2.apk
        run: |
          mkdir -p RELEASES/Proximity-Shark-1.0.2
          cp app/build/outputs/apk/release/app-release.apk \
             RELEASES/Proximity-Shark-1.0.2/"Proximity-Shark-1.0.2 (wear os) v2.apk"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Proximity-Shark-1.0.2 (wear os) v2
          path: RELEASES/Proximity-Shark-1.0.2/*.apk
          retention-days: 30

      # ── Auto-create GitHub Release on version tags ──────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: RELEASES/Proximity-Shark-1.0.2/"Proximity-Shark-1.0.2 (wear os) v2.apk"
          name: "🦈⌚ Proximity Shark WearOS ${{ github.ref_name }} — The Persistence & Stealth Update"
          body: |
            ## ⌚ Proximity Shark WearOS ${{ github.ref_name }} — The Persistence & Stealth Update

            ### 🚀 Novità in questa release (v1.0.8 / Wear v1.0.2):
            - **🛡️ Remote Shutdown**: Terza scheda dedicata allo spegnimento remoto del PC.
            - **🔄 Vertical Loop**: Navigazione infinita tra Panic, Taskkill e Shutdown.
            - **⚡ Sync Feedback**: Animazioni di caricamento sincronizzate con lo stato reale del telefono.
            - **🧹 UI Lean**: Rimozione del layout US duplicato per una scelta più rapida.

            ### ⏪ Riepilogo v1.0.1:
            - Ottimizzazione 60 FPS e compressione GZIP per librerie script.

            ### APK incluso:
            - `Proximity-Shark-1.0.2 (wear os) v2.apk` — Build per smartwatch.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
