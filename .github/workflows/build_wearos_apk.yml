name: 🦈 Build ProximityShark WearOS APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-wearos:
    name: ⌚ Wear OS APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Wear OS release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx4096m -XX:MaxMetaspaceSize=1024m'"

      - name: Rename APK → Proximity-Shark-1.0.2 (wear os).apk
        run: |
          mkdir -p RELEASES/Proximity-Shark-1.0.2
          cp app/build/outputs/apk/release/app-release.apk \
             RELEASES/Proximity-Shark-1.0.2/"Proximity-Shark-1.0.2 (wear os).apk"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Proximity-Shark-1.0.2 (wear os)
          path: RELEASES/Proximity-Shark-1.0.2/*.apk
          retention-days: 30

      # ── Auto-create GitHub Release on version tags ──────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: RELEASES/Proximity-Shark-1.0.2/"Proximity-Shark-1.0.2 (wear os).apk"
          name: "🦈⌚ Proximity Shark WearOS ${{ github.ref_name }}"
          body: |
            ## ⌚ Proximity Shark WearOS ${{ github.ref_name }}

            ### Novità in questa release:
            - ⏱️ **Timer Panico** — countdown 10m sincronizzato con il telefono
            - ↕️ **Vertical Swipe** — scorri su/giù tra Panico e Taskkill
            - 💀 **Taskkill Direct** — pulsante teschio per chiudere i processi via HID

            ### APK incluso:
            - `ProximityShark_v1.1.0_OS.apk` — per Galaxy Watch / Wear OS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
